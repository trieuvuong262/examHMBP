{% extends "base.html" %}

{% block content %}
<style>
    :root {
        --hm-primary: rgb(0, 144, 161);
        --hm-primary-hover: rgb(0, 115, 129);
    }

    body {
        /* Tạo hiệu ứng gradient nhẹ cho nền trang login */
        background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        min-height: 100vh;
    }

    .login-container {
        margin-top: 8vh;
    }

    .card-login {
        border: none;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        overflow: hidden;
    }

    .login-header {
        background-color: var(--hm-primary);
        padding: 2.5rem 1rem;
        color: white;
        text-align: center;
    }

    .login-header i {
        font-size: 3rem;
        margin-bottom: 1rem;
        display: block;
    }

    .form-control {
        border-radius: 10px;
        padding: 12px 15px;
        border: 1px solid #e2e8f0;
        transition: all 0.3s;
    }

    .form-control:focus {
        border-color: var(--hm-primary);
        box-shadow: 0 0 0 4px rgba(0, 144, 161, 0.1);
    }

    .input-group-text {
        background-color: #f8fafc;
        border-color: #e2e8f0;
        color: #94a3b8;
        border-radius: 10px 0 0 10px;
    }

    .form-control {
        border-radius: 0 10px 10px 0;
    }

    .btn-login {
        background-color: var(--hm-primary);
        color: white;
        border: none;
        border-radius: 10px;
        padding: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s;
    }

    .btn-login:hover {
        background-color: var(--hm-primary-hover);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 144, 161, 0.3);
        color: white;
    }

    .brand-text {
        font-size: 0.75rem;
        color: #94a3b8;
        text-align: center;
        margin-top: 2rem;
    }
</style>

<div class="container login-container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card card-login animate__animated animate__fadeInUp">
                <div class="login-header">
                    <i class="bi bi-shield-lock-fill"></i>
                    <h3 class="fw-bold mb-0">HỆ THỐNG HM</h3>
                    <p class="small opacity-75 mb-0">Vui lòng đăng nhập để tiếp tục</p>
                </div>

                <div class="card-body p-4 p-md-5">
                    {% if form.errors %}
                        <div class="alert alert-danger border-0 small py-2 px-3 mb-4 rounded-3">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i> Sai tài khoản hoặc mật khẩu!
                        </div>
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-secondary text-uppercase">Tài khoản</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                                <input type="text" name="username" class="form-control" placeholder="Tên đăng nhập" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small fw-bold text-secondary text-uppercase">Mật khẩu</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
                                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                <label class="form-check-label small text-muted" for="rememberMe">Ghi nhớ tôi</label>
                            </div>
                            <a href="#" class="small text-decoration-none" style="color: var(--hm-primary);">Quên mật khẩu?</a>
                        </div>

                        <button type="submit" class="btn btn-login w-100 shadow-sm">
                            Đăng nhập ngay <i class="bi bi-arrow-right-short ms-1"></i>
                        </button>
                    </form>
                </div>
            </div>
            
            <div class="brand-text">
                &copy; 2026 HM Hospital Management System<br>
                <small>Phiên bản 3.0.1 - Bảo mật tối ưu</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
