{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-danger shadow">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">Xác nhận xóa kỳ thi</h4>
                </div>
                <div class="card-body text-center">
                    <p class="lead">Bạn có chắc chắn muốn xóa kỳ thi:</p>
                    <h3 class="text-primary mb-4">"{{ exam.title }}"</h3>
                    <div class="alert alert-warning">
                        <strong>Cảnh báo:</strong> Hành động này sẽ xóa toàn bộ câu hỏi liên kết và kết quả bài làm của nhân viên trong kỳ thi này. Không thể hoàn tác!
                    </div>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-around mt-4">
                            <a href="{% url 'admin_dashboard' %}" class="btn btn-secondary px-4">Hủy bỏ</a>
                            <button type="submit" class="btn btn-danger px-4">Vâng, tôi muốn xóa</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
